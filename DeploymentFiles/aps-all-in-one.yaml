# ═══════════════════════════════════════════════════════════════════════════════
# Best Buy Store — Kubernetes Manifests (All-in-One)
# Apply with: kubectl apply -f aps-all-in-one.yaml
# ═══════════════════════════════════════════════════════════════════════════════

# ── Namespace ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: bestbuy-store

---
# ── ConfigMap ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: store-config
  namespace: bestbuy-store
data:
  ORDER_QUEUE_NAME: "orders"
  ORDER_QUEUE_PORT: "5672"
  ORDER_QUEUE_TRANSPORT: "tls"
  FASTIFY_ADDRESS: "0.0.0.0"
  ORDER_DB_NAME: "orderdb"
  ORDER_DB_COLLECTION_NAME: "orders"

---
# ── Secret ─────────────────────────────────────────────────────────────────────
# Values are base64-encoded. Defaults: admin / admin / mongopassword
# To encode: echo -n "yourvalue" | base64
apiVersion: v1
kind: Secret
metadata:
  name: store-secrets
  namespace: bestbuy-store
type: Opaque
data:
  RABBITMQ_USERNAME: YWRtaW4=          # admin
  RABBITMQ_PASSWORD: YWRtaW4=          # admin
  MONGO_ROOT_USERNAME: YWRtaW4=        # admin
  MONGO_ROOT_PASSWORD: bW9uZ29wYXNz    # mongopass

---
# ═══════════════════════════════════════════════════════════════════════════════
# MONGODB — StatefulSet + Service
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: bestbuy-store
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:6.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: store-secrets
                  key: MONGO_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: store-secrets
                  key: MONGO_ROOT_PASSWORD
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: bestbuy-store
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017

---
# ═══════════════════════════════════════════════════════════════════════════════
# RABBITMQ — Deployment + Service
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: bestbuy-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: store-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: store-secrets
                  key: RABBITMQ_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: bestbuy-store
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672

---
# ═══════════════════════════════════════════════════════════════════════════════
# ORDER SERVICE — Deployment + Service
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: bestbuy-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: usamaiqbal25/order-service:latest
          ports:
            - containerPort: 3000
          env:
            - name: ORDER_QUEUE_HOSTNAME
              value: rabbitmq
            - name: ORDER_QUEUE_PORT
              valueFrom:
                configMapKeyRef:
                  name: store-config
                  key: ORDER_QUEUE_PORT
            - name: ORDER_QUEUE_NAME
              valueFrom:
                configMapKeyRef:
                  name: store-config
                  key: ORDER_QUEUE_NAME
            - name: ORDER_QUEUE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: store-secrets
                  key: RABBITMQ_USERNAME
            - name: ORDER_QUEUE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: store-secrets
                  key: RABBITMQ_PASSWORD
            - name: ORDER_DB_URI
              value: mongodb://admin:mongopass@mongodb:27017/orderdb?authSource=admin
            - name: MONGO_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: store-secrets
                  key: MONGO_ROOT_USERNAME
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: store-secrets
                  key: MONGO_ROOT_PASSWORD
            - name: FASTIFY_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: store-config
                  key: FASTIFY_ADDRESS
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: bestbuy-store
spec:
  selector:
    app: order-service
  ports:
    - port: 3000
      targetPort: 3000

---
# ═══════════════════════════════════════════════════════════════════════════════
# MAKELINE SERVICE — Deployment + Service
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: makeline-service
  namespace: bestbuy-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: makeline-service
  template:
    metadata:
      labels:
        app: makeline-service
    spec:
      containers:
        - name: makeline-service
          image: usamaiqbal25/makeline-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: ORDER_QUEUE_URI
              value: amqp://$(RABBITMQ_USERNAME):$(RABBITMQ_PASSWORD)@rabbitmq:5672
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: store-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: store-secrets
                  key: RABBITMQ_PASSWORD
            - name: ORDER_QUEUE_NAME
              valueFrom:
                configMapKeyRef:
                  name: store-config
                  key: ORDER_QUEUE_NAME
            - name: ORDER_DB_URI
              value: mongodb://admin:mongopass@mongodb:27017/orderdb?authSource=admin
            - name: MONGO_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: store-secrets
                  key: MONGO_ROOT_USERNAME
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: store-secrets
                  key: MONGO_ROOT_PASSWORD
            - name: ORDER_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: store-config
                  key: ORDER_DB_NAME
            - name: ORDER_DB_COLLECTION_NAME
              valueFrom:
                configMapKeyRef:
                  name: store-config
                  key: ORDER_DB_COLLECTION_NAME
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: makeline-service
  namespace: bestbuy-store
spec:
  selector:
    app: makeline-service
  ports:
    - port: 3001
      targetPort: 3001

---
# ═══════════════════════════════════════════════════════════════════════════════
# PRODUCT SERVICE — Deployment + Service
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: bestbuy-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: usamaiqbal25/product-service:latest
          ports:
            - containerPort: 3002
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: bestbuy-store
spec:
  selector:
    app: product-service
  ports:
    - port: 3002
      targetPort: 3002

---
# ═══════════════════════════════════════════════════════════════════════════════
# STORE FRONT — Deployment + Service (LoadBalancer — public)
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-front
  namespace: bestbuy-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-front
  template:
    metadata:
      labels:
        app: store-front
    spec:
      containers:
        - name: store-front
          image: usamaiqbal25/store-front:latest
          ports:
            - containerPort: 8080
          env:
            - name: VUE_APP_ORDER_SERVICE_URL
              value: http://order-service:3000/
            - name: VUE_APP_PRODUCT_SERVICE_URL
              value: http://product-service:3002/
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: store-front
  namespace: bestbuy-store
spec:
  type: LoadBalancer
  selector:
    app: store-front
  ports:
    - port: 80
      targetPort: 8080

---
# ═══════════════════════════════════════════════════════════════════════════════
# STORE ADMIN — Deployment + Service (LoadBalancer — public)
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-admin
  namespace: bestbuy-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-admin
  template:
    metadata:
      labels:
        app: store-admin
    spec:
      containers:
        - name: store-admin
          image: usamaiqbal25/store-admin:latest
          ports:
            - containerPort: 8081
          env:
            - name: VUE_APP_ORDER_SERVICE_URL
              value: http://order-service:3000/
            - name: VUE_APP_PRODUCT_SERVICE_URL
              value: http://product-service:3002/
            - name: VUE_APP_MAKELINE_SERVICE_URL
              value: http://makeline-service:3001/
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: store-admin
  namespace: bestbuy-store
spec:
  type: LoadBalancer
  selector:
    app: store-admin
  ports:
    - port: 80
      targetPort: 8081